- id: prayer_times
  alias: Putar Suara Adzan
  description: "Automation to play Adzan based on prayer times"
  trigger:
    - platform: time
      at: sensor.fajr
      id: fajr
    - platform: time
      at: sensor.dhuhr
      id: dhuhr
    - platform: time
      at: sensor.asr
      id: asr
    - platform: time
      at: sensor.maghrib
      id: maghrib
    - platform: time
      at: sensor.isha
      id: isha
  condition: []
  action:
    - service: media_player.volume_set
      data:
        volume_level: "0.5"
      target:
        entity_id: media_player.change_this_into_your_google_nest_name
    - choose:
        - conditions:
            - condition: trigger
              id: "fajr"
          sequence:
            - service: media_player.play_media
              target:
                entity_id: media_player.change_this_into_your_google_nest_name
              data:
                media_content_id: media-source://media_source/local/azansubuh.mp3
                media_content_type: audio/mpeg
        - conditions:
            - condition: trigger
              id: ["dhuhr", "asr", "maghrib", "isha"]
          sequence:
            - service: media_player.play_media
              target:
                entity_id: media_player.change_this_into_your_google_nest_name
              data:
                media_content_id: media-source://media_source/local/Adhan Makkah.mp3
                media_content_type: audio/mpeg
  mode: single
