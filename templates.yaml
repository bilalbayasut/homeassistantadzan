# templates.yaml
- sensor:
    - name: "Fajr"
      unique_id: fajr_prayer_time
      state: >
        {% set prayer_data = state_attr('sensor.prayer_times', 'data') %}
        {{ prayer_data['timings']['Fajr'] if prayer_data else 'unavailable' }}
